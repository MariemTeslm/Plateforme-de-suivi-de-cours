<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>supnum - Progression des Cours</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .subject-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
        }
        .subject-card:hover { transform: translateY(-2px); }
        .progress-section { margin-top: 12px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 6px; font-weight: 500; }
        .bar-outer { background: #f1f5f9; height: 8px; border-radius: 8px; overflow: hidden; margin-bottom: 10px; }
        .bar-inner { height: 100%; border-radius: 8px; transition: width 1s ease-out; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../../assets/images/logo.jpeg" alt="supnum" class="sidebar-logo">
                <span class="sidebar-title">supnum</span>
            </div>
            <nav class="sidebar-nav">
                <a href="../tableaux/tableaux.html" class="nav-item">
                    <span class="icon">📅</span>
                    Mon Emploi
                </a>
                <a href="progression.html" class="nav-item active">
                    <span class="icon">📊</span>
                    Progression
                </a>
                <a href="prof_dashboard.html" class="nav-item">
                    <span class="icon">🏠</span>
                    Accueil
                </a>
            </nav>
            <div style="margin-top: auto; padding-top: var(--space-xl); border-top: 1px solid var(--border-light);">
                <a href="prof_dashboard.html" class="btn btn-outline" style="width: 100%; text-decoration: none; justify-content: center;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink: 0;"><path d="M19 12H5M12 19l-7-7 7-7" /></svg>
                    Retour
                </a>
                <button onclick="logout()" class="btn btn-danger" style="width: 100%; margin-top: var(--space-sm);">Déconnexion</button>
            </div>
        </aside>

        <main class="main-content">
            <h1 class="page-title">Progression de mes enseignements</h1>
            <p class="page-subtitle">Suivez l'état d'avancement de vos modules par type de séance.</p>

            <div id="subjects-list">
                <div style="text-align: center; padding: 40px; color: #94a3b8;">Chargement de vos cours...</div>
            </div>
        </main>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script>
        function logout() {
            localStorage.clear();
            window.location.href = '../Login/index.html';
        }

        async function loadProgression() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const list = document.getElementById('subjects-list');
            if (!list) return;

            try {
                if (!user.nom) {
                    list.innerHTML = '<div style="background:white; border-radius:16px; padding:40px; text-align:center; border:1px solid #e2e8f0;"><p style="color:#64748b;">Utilisateur non connecté.</p></div>';
                    return;
                }

                const res = await API.get(`/matieres/professor?nom=${encodeURIComponent(user.nom)}`);
                const myMatieres = res.data || [];

                if (myMatieres.length === 0) {
                    list.innerHTML = '<div style="background:white; border-radius:16px; padding:40px; text-align:center; border:1px solid #e2e8f0;"><p style="color:#64748b;">Aucune matière affectée pour le moment.</p></div>';
                    return;
                }

                list.innerHTML = myMatieres.map(m => {
                    const pctCM = m.total_CM > 0 ? Math.min(100, Math.round((m.realise_CM / m.total_CM) * 100)) : 0;
                    const pctTD = m.total_TD > 0 ? Math.min(100, Math.round((m.realise_TD / m.total_TD) * 100)) : 0;
                    const pctTP = m.total_TP > 0 ? Math.min(100, Math.round((m.realise_TP / m.total_TP) * 100)) : 0;

                    const renderBar = (pct, color, label, current, total) => {
                        if (total <= 0) return '';
                        return `
                            <div class="progress-section">
                                <div class="bar-label">
                                    <span style="color: #334155;"><strong>${label}</strong></span>
                                    <span style="color: ${color};">${current}/${total}h (${pct}%)</span>
                                </div>
                                <div class="bar-outer">
                                    <div class="bar-inner" style="width: ${pct}%; background-color: ${color};"></div>
                                </div>
                            </div>
                        `;
                    }

                    return `
                        <div class="subject-card">
                            <div style="display:flex; justify-content:space-between; align-items: flex-start; margin-bottom: 16px;">
                                <div>
                                    <h3 style="margin:0; color:#1e293b; font-size:1.1rem;">${m.nom_matiere || m.nom}</h3>
                                    <span style="font-size:0.8rem; color:#64748b;">Groupe: <strong>${m.nom_groupe}</strong> | Coef: ${m.coefficient}</span>
                                </div>
                                <span style="background:#f0f6ff; color:#2563eb; padding:4px 10px; border-radius:16px; font-size:0.7rem; font-weight:600; border:1px solid #dbeafe;">
                                    ${m.module || 'Général'}
                                </span>
                            </div>
                            ${renderBar(pctCM, '#2563eb', 'CM', m.realise_CM, m.total_CM)}
                            ${renderBar(pctTD, '#10b981', 'TD', m.realise_TD, m.total_TD)}
                            ${renderBar(pctTP, '#8b5cf6', 'TP', m.realise_TP, m.total_TP)}
                        </div>
                    `;
                }).join('');

            } catch (err) {
                list.innerHTML = '<div style="color: #ef4444; text-align: center; padding: 20px;">Erreur de chargement.</div>';
            }
        }

        window.onload = loadProgression;
    </script>
</body>
</html>
