<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>supnum - Gestion des Étudiants</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="app-layout">
         <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../../assets/images/logo.jpeg" alt="supnum" class="sidebar-logo">
                <span class="sidebar-title">supnum</span>
            </div>
            <nav class="sidebar-nav">
                <a href="admin.html" class="nav-item active">
                    <span class="icon">🏠</span>
                    Accueil
                </a>
                <a href="gestionUtilisateur.html" class="nav-item">
                    <span class="icon">👥</span>
                    Utilisateur
                </a>
                
                <a href="gestionsEtablissement.html" class="nav-item">
                    <span class="icon">🏢</span>
                    Etablissement
                </a>
                <a href="gestionEmploi.html" class="nav-item">
                    <span class="icon">📚</span>
                    Emploi du temps
                </a>
                
                <a href="../evaluation/evaluation.html" class="nav-item">
                    <span class="icon">📊</span>
                    Évaluations
                </a>
               
            </nav>
            <div style="margin-top: auto; padding-top: var(--space-xl); border-top: 1px solid var(--border-light);">
                <button onclick="logout()" class="btn btn-danger" style="width: 100%;">Déconnexion</button>
            </div>
        </aside>



        <main class="main-content">
            <h1 class="page-title">Gestion des Étudiants</h1>
            <p class="page-subtitle">Inscriptions et Listes des etudiants</p>

            <form id="studentForm" style="margin-bottom: var(--space-2xl);">
                <legend>Ajouter un nouvel étudiant</legend>
                <div class="form-grid">
                    <div>
                        <label for="matricule">Matricule</label>
                        <input type="text" id="matricule" placeholder="Ex: 24001" required>
                    </div>
                    <div>
                        <label for="nom">Nom complet</label>
                        <input type="text" id="nom" placeholder="Ex: Ahmed Fall" required>
                    </div>
                    <div>
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="student@school.mr" required>
                    </div>
                    <div>
                        <label for="departement">Département</label>
                        <select id="departement" required>
                            <option value="">-- Choisir --</option>
                            <option value="DSI">DSI</option>
                            <option value="RSS">RSS</option>
                            <option value="DWM">DWM</option>
                        </select>
                    </div>
                    <div>
                        <label for="niveau">Niveau</label>
                        <select id="niveau" required>
                            <option value="">-- Choisir --</option>
                            <option value="L1">Licence 1</option>
                            <option value="L2">Licence 2</option>
                            <option value="L3">Licence 3</option>
                            <option value="M1">Master 1</option>
                            <option value="M2">Master 2</option>
                        </select>
                    </div>
                     
                    <div class="full">
                        <label for="mot_de_passe">Mot de passe initial</label>
                        <input type="password" id="mot_de_passe" placeholder="••••••••" required>
                    </div>
                    <div class="full center" style="margin-top: var(--space-lg); gap: var(--space-md);">
                        <button type="submit" id="submitBtn">Enregistrer</button>
                        <button type="button" id="cancelEdit" class="btn btn-outline" style="display: none;" onclick="cancelStudentEdit()">Annuler</button>
                    </div>
                </div>
            </form>

            <div class="card" style="margin-bottom: var(--space-lg);">
                <h3 style="margin-bottom: var(--space-md);">Filtres</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-md);">
                    <div>
                        <label style="font-size: 0.8rem;">Rechercher</label>
                        <input type="text" id="studentSearch" placeholder="Nom, Matricule...">
                    </div>
                    <div>
                        <label style="font-size: 0.8rem;">Groupe</label>
                        <select id="filterGroup">
                            <option value="">Tous les groupes</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size: 0.8rem;">Niveau</label>
                        <select id="filterNiveau">
                            <option value="">Tous</option>
                            <option value="L1">L1</option>
                            <option value="L2">L2</option>
                            <option value="L3">L3</option>
                            <option value="M1">M1</option>
                            <option value="M2">M2</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="table-responsive">
                <table id="studentsTable">
                    <thead>
                        <tr>
                            <th>Matricule</th>
                            <th>Nom</th>
                            <th>Groupe(s)</th>
                            <th>Niveau</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="student.js?v=2"></script>
    <script>
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../Login/index.html';
        }
    </script>
</body>
</html>
