<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>supnum - Gestion des Professeurs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../../assets/images/logo.jpeg" alt="supnum" class="sidebar-logo">
                <span class="sidebar-title">supnum</span>
            </div>
            <nav class="sidebar-nav">
                <a href="admin.html" class="nav-item active">
                    <span class="icon">🏠</span>
                    Accueil
                </a>
                <a href="gestionUtilisateur.html" class="nav-item">
                    <span class="icon">👥</span>
                    Utilisateur
                </a>
                
                <a href="gestionsEtablissement.html" class="nav-item">
                    <span class="icon">🏢</span>
                    Etablissement
                </a>
                <a href="gestionEmploi.html" class="nav-item">
                    <span class="icon">📚</span>
                    Emploi du temps
                </a>
                
                <a href="../evaluation/evaluation.html" class="nav-item">
                    <span class="icon">📊</span>
                    Évaluations
                </a>
               
            </nav>
            <div style="margin-top: auto; padding-top: var(--space-xl); border-top: 1px solid var(--border-light);">
                <button onclick="logout()" class="btn btn-danger" style="width: 100%;">Déconnexion</button>
            </div>
        </aside>

        <main class="main-content">
            <h1 class="page-title">Gestion des Professeurs</h1>
            <p class="page-subtitle">Affectations et spécialités</p>

            <form id="profForm" style="margin-bottom: var(--space-2xl);">
                <legend>Ajouter un nouveau professeur</legend>
                <div class="form-grid">
                    <div><label for="nom">Nom complet</label><input type="text" id="nom" placeholder="Ex: Jean Dupont" required></div>
                    <div><label for="email">Email professionnel</label><input type="email" id="email" placeholder="example@school.com" required></div>
                    <div><label for="mot_de_passe">Mot de passe</label><input type="password" id="mot_de_passe" placeholder="••••••••" required></div>
                    <div style="grid-column: 1 / -1;">
                        <label>Spécialités (matières)</label>
                        <input type="text" id="searchMatiere" placeholder="Rechercher une matière..." style="margin-bottom: var(--space-sm);">
                        <div id="matieres-list" style="max-height: 160px; overflow-y: auto; border: 1.5px solid var(--border); border-radius: var(--radius-md); padding: var(--space-md); background: var(--bg-main); display: flex; flex-direction: column; gap: var(--space-xs);"></div>
                        <select id="matieres" multiple style="display:none;"></select>
                    </div>
                    <div class="full center" style="margin-top: var(--space-lg); gap: var(--space-md);">
                        <button type="submit" id="submitBtn">Enregistrer</button>
                        <button type="button" id="cancelEdit" class="btn btn-outline" style="display: none;" onclick="cancelTeacherEdit()">Annuler</button>
                    </div>
                </div>
            </form>

            <div class="card" style="margin-bottom: var(--space-lg);">
                <input type="text" id="profSearch" placeholder="Rechercher un professeur (nom, email...)" style="max-width: 350px;">
            </div>

            <div class="table-responsive">
                <table id="teachersTable">
                    <thead>
                        <tr><th>ID</th><th>Nom</th><th>Email</th><th>Matières</th><th>Actions</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="../../assets/js/api.js"></script>
    <script src="prof.js?v=2"></script>
    <script>function logout(){localStorage.removeItem('token');localStorage.removeItem('user');window.location.href='../Login/index.html';}</script>
</body>
</html>
