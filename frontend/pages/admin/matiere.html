<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>supnum - Gestion des Matières</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="../../assets/images/logo.jpeg" alt="supnum" class="sidebar-logo">
            <span class="sidebar-title">supnum</span>
        </div>
        <nav class="sidebar-nav">
            <a href="admin.html" class="nav-item active"><span class="icon">🏠</span>Accueil</a>
            <a href="gestionUtilisateur.html" class="nav-item"><span class="icon">👥</span>Utilisateur</a>
            <a href="gestionsEtablissement.html" class="nav-item"><span class="icon">🏢</span>Etablissement</a>
            <a href="gestionEmploi.html" class="nav-item"><span class="icon">📚</span>Emploi du temps</a>
            <a href="../evaluation/evaluation.html" class="nav-item"><span class="icon">📊</span>Évaluations</a>
        </nav>
        <div style="margin-top:auto; padding-top:var(--space-xl); border-top:1px solid var(--border-light);">
            <button onclick="logout()" class="btn btn-danger" style="width:100%;">Déconnexion</button>
        </div>
    </aside>

    <main class="main-content">
        <h1 class="page-title">Gestion des Matières</h1>
        <p class="page-subtitle">Créez des matières et respectez le nombre d’heures</p>

        <form id="matiereForm" style="margin-bottom:var(--space-2xl);">
            <legend>Ajouter / Modifier une matière</legend>
            <div class="form-grid">
                <div><label for="nom_matiere">Nom de la matière</label><input type="text" id="nom_matiere" placeholder="Ex: Algorithmique" required></div>
                <div><label for="code_matiere">Code unique</label><input type="text" id="code_matiere" placeholder="Ex: CS101" required></div>
                <div><label for="credit">Crédit</label><input type="number" id="credit" min="0.5" step="0.5" value="1" required></div>
                <div><label for="total_CM">CM (Heures)</label><input type="number" id="total_CM" min="0" value="0"></div>
                <div><label for="total_TD">TD (Heures)</label><input type="number" id="total_TD" min="0" value="0"></div>
                <div><label for="total_TP">TP (Heures)</label><input type="number" id="total_TP" min="0" value="0"></div>
                <div class="full center" style="margin-top:var(--space-lg); gap:var(--space-md);">
                    <button type="submit" id="submitBtn">Enregistrer</button>
                    <button type="button" id="cancelEdit" class="btn btn-outline" style="display:none;" onclick="cancelMatiereEdit()">Annuler</button>
                </div>
                <div id="errorMsg" style="color:red; font-weight:bold;"></div>
            </div>
        </form>

        <h3 style="margin-bottom:var(--space-md);">Liste des matières</h3>
        <div class="table-responsive">
            <table id="matiereTable">
                <thead>
                    <tr>
                        <th>Matière</th><th>Code</th><th>Crédit</th><th>Nombre d’heures</th><th>Totale</th><th>Realisé</th><th>Progression</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div id="errorMsg" style="color:red; font-weight:bold;"></div>
    </main>
</div>

<script src="../../assets/js/api.js"></script>
<script src="matiere.js"></script>
<script>
function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href='../Login/index.html';
}
</script>
</body>
</html>
