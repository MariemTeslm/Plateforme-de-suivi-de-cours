<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>supnum - Gestion des Séances</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="app-layout">
         <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../../assets/images/logo.jpeg" alt="supnum" class="sidebar-logo">
                <span class="sidebar-title">supnum</span>
            </div>
            <nav class="sidebar-nav">
                <a href="admin.html" class="nav-item active">
                    <span class="icon">🏠</span>
                    Accueil
                </a>
                <a href="gestionUtilisateur.html" class="nav-item">
                    <span class="icon">👥</span>
                    Utilisateur
                </a>
                
                <a href="gestionsEtablissement.html" class="nav-item">
                    <span class="icon">🏢</span>
                    Etablissement
                </a>
                <a href="gestionEmploi.html" class="nav-item">
                    <span class="icon">📚</span>
                    Emploi du temps
                </a>
                
                <a href="../evaluation/evaluation.html" class="nav-item">
                    <span class="icon">📊</span>
                    Évaluations
                </a>
               
            </nav>
            <div style="margin-top: auto; padding-top: var(--space-xl); border-top: 1px solid var(--border-light);">
                <button onclick="logout()" class="btn btn-danger" style="width: 100%;">Déconnexion</button>
            </div>
        </aside>

        <main class="main-content">
            <h1 class="page-title">Gestion des Séances</h1>
            <p class="page-subtitle">Configurez l'emploi du temps hebdomadaire</p>

            <form id="seanceForm" style="margin-bottom: var(--space-2xl);">
                <legend>Programmer une nouvelle séance</legend>
                <div class="form-grid">
                    <div><label for="nom_groupe">Groupe</label><select id="nom_groupe" required><option value="">-- Sélectionner --</option></select></div>
                    <div><label for="nom_professeur">Professeur</label><select id="nom_professeur" required><option value="">-- Sélectionner --</option></select></div>
                    <div><label for="nom_matiere">Matière</label><select id="nom_matiere" required><option value="">-- Sélectionner --</option></select></div>
                    <div><label for="nom_salle">Salle</label><select id="nom_salle" required><option value="">-- Sélectionner --</option></select></div>
                    <div><label for="id_periode">Période</label><select id="id_periode" required><option value="">-- Sélectionner --</option></select></div>
                    <div><label for="type_seance">Type de séance</label>
                        <select id="type_seance" required>
                            <option value="CM">CM (Cours Magistral)</option>
                            <option value="TD">TD (Travaux Dirigés)</option>
                            <option value="TP">TP (Travaux Pratiques)</option>
                        </select>
                    </div>
                    <div><label for="jour">Jour</label>
                        <select id="jour" required>
                            <option value="">-- Sélectionner --</option>
                            <option value="Lundi">Lundi</option>
                            <option value="Mardi">Mardi</option>
                            <option value="Mercredi">Mercredi</option>
                            <option value="Jeudi">Jeudi</option>
                            <option value="Vendredi">Vendredi</option>
                            <option value="Samedi">Samedi</option>
                        </select>
                    </div>
                    <input type="hidden" id="id_semaine" value="1">
                    <div class="full center" style="margin-top: var(--space-lg); gap: var(--space-md);">
                        <button type="submit" id="submitBtn">Enregistrer</button>
                        <button type="button" id="cancelEdit" class="btn btn-outline" style="display: none;" onclick="cancelSeanceEdit()">Annuler</button>
                    </div>
                </div>
            </form>

            <div class="card" style="margin-bottom: var(--space-lg);">
                <div style="display: flex; flex-wrap: wrap; gap: var(--space-md); align-items: center;">
                    <h3 style="margin: 0;">Séances programmées</h3>
                    <input type="text" id="filterProf" placeholder="Professeur" style="max-width: 150px;">
                    <input type="text" id="filterGroup" placeholder="Groupe" style="max-width: 130px;">
                    <select id="filterDay" style="max-width: 130px;">
                        <option value="">Tous les jours</option>
                        <option value="Lundi">Lundi</option>
                        <option value="Mardi">Mardi</option>
                        <option value="Mercredi">Mercredi</option>
                        <option value="Jeudi">Jeudi</option>
                        <option value="Vendredi">Vendredi</option>
                        <option value="Samedi">Samedi</option>
                    </select>
                </div>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Jour</th><th>Période</th><th>Groupe</th><th>Matière</th><th>Professeur</th><th>Salle</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="seancesTable"></tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="../../assets/js/api.js"></script>
    <script src="seance.js"></script>
    <script>function logout(){localStorage.removeItem('token');localStorage.removeItem('user');window.location.href='../Login/index.html';}</script>
</body>
</html>
