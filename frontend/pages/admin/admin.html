<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>supnum - Administration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../../assets/images/logo.jpeg" alt="supnum" class="sidebar-logo">
                <span class="sidebar-title">supnum</span>
            </div>
            <nav class="sidebar-nav">
                <a href="admin.html" class="nav-item active">
                    <span class="icon">🏠</span>
                    Accueil
                </a>
                <a href="gestionUtilisateur.html" class="nav-item">
                    <span class="icon">👥</span>
                    Utilisateur
                </a>
                
                <a href="gestionsEtablissement.html" class="nav-item">
                    <span class="icon">🏢</span>
                    Etablissement
                </a>
                <a href="gestionEmploi.html" class="nav-item">
                    <span class="icon">📚</span>
                    Emploi du temps
                </a>
                
                <a href="../evaluation/evaluation.html" class="nav-item">
                    <span class="icon">📊</span>
                    Évaluations
                </a>
               
            </nav>
            <div style="margin-top: auto; padding-top: var(--space-xl); border-top: 1px solid var(--border-light);">
                <button onclick="logout()" class="btn btn-danger" style="width: 100%;">Déconnexion</button>
            </div>
        </aside>

        <main class="main-content">
            <h1 class="page-title">Tableau de bord</h1>
            <p class="page-subtitle">Gérez l'ensemble de votre établissement</p>

            <!-- Statistiques -->
            <div class="stats-grid">
                <div class="stat-card stat-card--students">
                    <div class="stat-icon">🎓</div>
                    <div class="stat-content">
                        <span class="stat-label">Étudiants</span>
                        <span class="stat-value" id="stat-students">--</span>
                    </div>
                </div>
                <div class="stat-card stat-card--profs">
                    <div class="stat-icon">👨‍🏫</div>
                    <div class="stat-content">
                        <span class="stat-label">Professeurs</span>
                        <span class="stat-value" id="stat-profs">--</span>
                    </div>
                </div>
                <div class="stat-card stat-card--groups">
                    <div class="stat-icon">👥</div>
                    <div class="stat-content">
                        <span class="stat-label">Groupes</span>
                        <span class="stat-value" id="stat-groups">--</span>
                    </div>
                </div>
                <div class="stat-card stat-card--salles">
                    <div class="stat-icon">🏢</div>
                    <div class="stat-content">
                        <span class="stat-label">Salles</span>
                        <span class="stat-value" id="stat-salles">--</span>
                    </div>
                </div>
            </div>

            <!-- Accès rapide -->
            <h2 class="section-title">Accès rapide</h2>
            <div class="quick-access-grid">
                <a href="student.html" class="quick-access-card">
                    <span class="icon">🎓</span>
                    <span>Étudiants</span>
                </a>
                <a href="prof.html" class="quick-access-card">
                    <span class="icon">👨‍🏫</span>
                    <span>Professeurs</span>
                </a>
               
                
                <a href="../evaluation/evaluation.html" class="quick-access-card quick-access-card--warning">
                    <span class="icon">📊</span>
                    <span>Évaluations</span>
                </a>
                <a href="../tableaux/tableaux.html" class="quick-access-card quick-access-card--success">
                    <span class="icon">📋</span>
                    <span>Emploi du temps</span>
                </a>
            </div>
        </main>
    </div>

    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: var(--space-lg);
            margin-bottom: var(--space-2xl);
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-xl);
            display: flex;
            align-items: center;
            gap: var(--space-lg);
            transition: all var(--transition-base);
            box-shadow: var(--shadow-sm);
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }
        .stat-icon { font-size: 2.5rem; line-height: 1; }
        .stat-content { display: flex; flex-direction: column; gap: 4px; }
        .stat-label { font-size: 0.875rem; color: var(--text-secondary); font-weight: 500; }
        .stat-value { font-size: 1.75rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.02em; }
        .stat-card--students { border-left: 4px solid #0d9488; }
        .stat-card--profs { border-left: 4px solid #0284c7; }
        .stat-card--groups { border-left: 4px solid #7c3aed; }
        .stat-card--salles { border-left: 4px solid #059669; }
        .section-title { font-size: 1.25rem; font-weight: 700; color: var(--text-main); margin-bottom: var(--space-md); }
        .quick-access-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: var(--space-md);
        }
        .quick-access-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            padding: var(--space-lg);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.9375rem;
            transition: all var(--transition-fast);
        }
        .quick-access-card .icon { font-size: 1.75rem; }
        .quick-access-card:hover {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }
        .quick-access-card--warning:hover { border-color: var(--warning); color: var(--warning); }
        .quick-access-card--success:hover { border-color: var(--success); color: var(--success); }
    </style>
    <script src="../../assets/js/api.js"></script>
    <script>
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../Login/index.html';
        }

        async function loadStats() {
            try {
                const [s, p, g, sal] = await Promise.all([
                    API.get('/students/all').catch(() => ({ data: [] })),
                    API.get('/profs/all').catch(() => ({ data: [] })),
                    API.get('/groupes/all').catch(() => ({ data: [] })),
                    API.get('/salles/all').catch(() => ({ data: [] }))
                ]);
                document.getElementById('stat-students').textContent = (s.data || []).length;
                document.getElementById('stat-profs').textContent = (p.data || []).length;
                document.getElementById('stat-groups').textContent = (g.data || []).length;
                document.getElementById('stat-salles').textContent = (sal.data || []).length;
            } catch (e) {
                ['stat-students','stat-profs','stat-groups','stat-salles'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.textContent = '0';
                });
            }
        }
        document.addEventListener('DOMContentLoaded', loadStats);
    </script>
</body>
</html>
