<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>supnum - Évaluations des Matières</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        #matiereContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--space-lg); }
        .matiere-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            border: 1.5px solid #e2e8f0;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.5s ease-out;
            min-height: 220px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .matiere-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 12px 32px rgba(13, 148, 136, 0.15);
        }

        .matiere-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
        }

        .progress-bar-container {
            background: #f1f5f9;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin: 6px 0;
        }

        .progress-bar {
            height: 100%;
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            background: linear-gradient(90deg, var(--primary), var(--primary-hover));
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .stat-item {
            background: #f8fafc;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .stat-item strong {
            display: block;
            color: #1e293b;
            font-size: 0.95rem;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-group button {
            flex: 1;
            padding: 8px;
            font-size: 0.75rem;
            min-width: unset;
        }

        .badge-done {
            background: var(--success);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .tag {
            background: #e0e7ff;
            color: #4338ca;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        @media (max-width: 768px) {
            #matiereContainer { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../../assets/images/logo.jpeg" alt="supnum" class="sidebar-logo">
                <span class="sidebar-title">supnum</span>
            </div>
            <nav class="sidebar-nav" id="sidebarNav">
                <!-- Rempli dynamiquement selon le rôle -->
            </nav>
            <div style="margin-top: auto; padding-top: var(--space-xl); border-top: 1px solid var(--border-light);">
                <a href="#" id="dynamicBackBtn" class="btn btn-outline" style="width: 100%; text-decoration: none; justify-content: center;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink: 0;"><path d="M19 12H5M12 19l-7-7 7-7" /></svg>
                    Retour
                </a>
                <button onclick="logout()" class="btn btn-danger" style="width: 100%; margin-top: var(--space-sm);">Déconnexion</button>
            </div>
        </aside>

        <main class="main-content">
    <div style="max-width: 100%; margin: 0; padding: 0;">
        <h1 id="page-title">Évaluations des Matières</h1>
        <p id="page-subtitle" style="color: #64748b; margin-top: -12px; margin-bottom: 40px;">Suivez la progression
            pédagogique de chaque module.</p>

        <div id="matiereContainer">
            <!-- Content injected via JS -->
        </div>
        <div id="errorMessage"
            style="display: none; background: #fee2e2; border: 1px solid #ef4444; color: #b91c1c; padding: 16px; border-radius: 12px; margin-bottom: 24px;">
        </div>
    </div>
        </main>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script>
        const container = document.getElementById('matiereContainer');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        function renderSidebar() {
            const nav = document.getElementById('sidebarNav');
            if (!nav) return;
            const base = '../admin/';
            const isAdmin = user.role === 'administrateur';
            const isEtudiant = user.role === 'etudiant';
            const isProf = user.role === 'professeur';

            if (isAdmin) {
                nav.innerHTML = `
                    <a href="${base}admin.html" class="nav-item"><span class="icon">🏠</span>Accueil</a>
                    <a href="${base}student.html" class="nav-item"><span class="icon">🎓</span>Étudiants</a>
                    <a href="${base}prof.html" class="nav-item"><span class="icon">👨‍🏫</span>Professeurs</a>
                    <a href="${base}group.html" class="nav-item"><span class="icon">👥</span>Groupes</a>
                    <a href="${base}matiere.html" class="nav-item"><span class="icon">📚</span>Matières</a>
                    <a href="${base}salle.html" class="nav-item"><span class="icon">🏢</span>Salles</a>
                    <a href="${base}periode.html" class="nav-item"><span class="icon">⏱️</span>Périodes</a>
                    <a href="${base}semaine.html" class="nav-item"><span class="icon">📅</span>Semaines</a>
                    <a href="${base}seance.html" class="nav-item"><span class="icon">📑</span>Séances</a>
                    <a href="../evaluation/evaluation.html" class="nav-item active"><span class="icon">📊</span>Évaluations</a>
                    <a href="../tableaux/tableaux.html" class="nav-item"><span class="icon">📋</span>Emploi du temps</a>
                `;
            } else if (isEtudiant) {
                nav.innerHTML = `
                    <a href="../tableaux/tableaux.html" class="nav-item"><span class="icon">📅</span>Mon Emploi</a>
                    <a href="../evaluation/evaluation.html" class="nav-item active"><span class="icon">📊</span>Évaluation</a>
                `;
            } else if (isProf) {
                nav.innerHTML = `
                    <a href="../tableaux/tableaux.html" class="nav-item"><span class="icon">📅</span>Mon Emploi</a>
                    <a href="../profs/progression.html" class="nav-item"><span class="icon">📊</span>Progression</a>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../Login/index.html';
        }

        function initBackBtn() {
            const backBtn = document.getElementById('dynamicBackBtn');
            if (!backBtn) return;
            if (user.role === 'administrateur') backBtn.href = '../admin/admin.html';
            else if (user.role === 'etudiant') backBtn.href = '../students/student_dashboard.html';
            else if (user.role === 'professeur') backBtn.href = '../profs/prof_dashboard.html';
            else backBtn.href = '../Login/index.html';
        }

        async function fetchMatieres() {
            container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #64748b;">Chargement des données...</div>';
            try {
                let endpoint = "/matieres/all";

                if (user.role === 'etudiant') {
                    const resGroups = await API.get('/groupes/all');
                    const groups = resGroups.data || [];
                    const studentId = user.id_etudiant || user.id;
                    const chefGroup = groups.find(g => g.id_chef && (g.id_chef == studentId));
                    if (!chefGroup) {
                        container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #ef4444;">Accès réservé au chef de groupe uniquement.</div>';
                        return;
                    }
                    endpoint = `/matieres/group/${chefGroup.id_groupe}`;
                    document.getElementById('page-subtitle').textContent = `Progression pédagogique pour le groupe ${chefGroup.nom}`;
                } else if (user.role === 'professeur') {
                document.getElementById('page-subtitle').textContent = "Progression de vos enseignements";
            }

                const res = await API.get(endpoint);
                renderMatieres(res.data || []);
            } catch (err) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #ef4444;">Erreur lors du chargement.</div>';
            }
        }

        async function updateProgression(id, type) {
            if (!id || id === 0) {
                showError("Cette matière n'est pas encore assignée à un groupe. Impossible de l'évaluer.");
                return;
            }

            try {
                const res = await API.put(`/matieres/progression/${id}`, { type });
                if (res.error) throw new Error(res.message);
                fetchMatieres();
            } catch (err) {
                console.error(err);
                showError(err.message || "Erreur lors de la mise à jour");
            }
        }

        function showError(msg) {
            const errDiv = document.getElementById('errorMessage');
            errDiv.textContent = '⚠️ ' + msg;
            errDiv.style.display = 'block';
            setTimeout(() => { errDiv.style.display = 'none'; }, 5000);
        }

        function renderMatieres(matieres) {
            if (matieres.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #64748b;">Aucune matière trouvée.</div>';
                return;
            }

            container.innerHTML = '';
            matieres.forEach(m => {
                const progCM = m.total_CM ? (m.realise_CM / m.total_CM) * 100 : 0;
                const progTD = m.total_TD ? (m.realise_TD / m.total_TD) * 100 : 0;
                const progTP = m.total_TP ? (m.realise_TP / m.total_TP) * 100 : 0;
                const avg = Math.round((progCM + progTD + progTP) / 3);

                const card = document.createElement('div');
                card.className = 'matiere-card';
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div>
                            <span class="tag">${m.nom_groupe || 'N/A'}</span>
                            <h3 class="matiere-title" style="margin-top: 8px;">${m.code_matiere}</h3>
                        </div>
                        ${avg >= 100 ? '<span class="badge-done">Terminé</span>' : ''}
                    </div>
                    <p style="font-weight: 500; margin: -8px 0 0;">${m.nom_matiere}</p>
                    ${m.module ? `<p style="font-size: 0.8rem; color: #64748b; margin-top: -8px;">Module: ${m.module}</p>` : ''}
                    
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span>CM</span>
                            <strong>${m.realise_CM}/${m.total_CM}h</strong>
                        </div>
                        <div class="stat-item">
                            <span>TD</span>
                            <strong>${m.realise_TD}/${m.total_TD}h</strong>
                        </div>
                        <div class="stat-item">
                            <span>TP</span>
                            <strong>${m.realise_TP}/${m.total_TP}h</strong>
                        </div>
                    </div>

                    <div style="margin-top: auto;">
                        <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 4px;">
                            <span>Progression Globale</span>
                            <span>${avg}%</span>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" style="width: ${avg}%;"></div>
                        </div>
                        
                        <div class="btn-group">
                            ${m.id === 0 ?
                        '<p style="font-size: 0.75rem; color: #ef4444; text-align: center; width: 100%;">Matière non assignée à un groupe</p>' :
                        (user.role === 'professeur' ? '<p style="font-size: 0.8rem; color: #64748b; text-align: center; width: 100%;">Consultation uniquement</p>' : `
                                <button onclick="updateProgression(${m.id}, 'CM')">+1 CM</button>
                                <button onclick="updateProgression(${m.id}, 'TD')">+1 TD</button>
                                <button onclick="updateProgression(${m.id}, 'TP')">+1 TP</button>
                                `)}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!user.nom) {
                window.location.href = '../Login/index.html';
                return;
            }
            renderSidebar();
            initBackBtn();
            fetchMatieres();
        });
    </script>
</body>

</html>
