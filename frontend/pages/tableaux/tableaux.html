<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>supnum - Emploi du Temps</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .schedule-container { max-width: 100%; margin: 0; padding: 0; }
        .schedule-table-wrapper {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            padding: var(--space-lg);
            box-shadow: var(--shadow-md);
            overflow-x: auto;
        }
        #emploiTable { border-spacing: 8px; border-collapse: separate; width: 100%; table-layout: fixed; }
        #emploiTable th, #emploiTable td { padding: 0; border: none; }
        #emploiTable th:first-child, #emploiTable td:first-child { width: 100px; min-width: 90px; }
        #emploiTable th:not(:first-child) { min-width: 130px; max-width: 160px; }
        #emploiTable td:not(:first-child) { min-width: 130px; max-width: 160px; vertical-align: top; }
        .day-column {
            background: var(--primary);
            color: white;
            border-radius: var(--radius-md);
            padding: 12px;
            font-size: 0.875rem;
            font-weight: 700;
            text-align: center;
            vertical-align: middle;
        }
        .period-header {
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 10px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .seance-card {
            background: var(--bg-main);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px;
            margin-bottom: 8px;
            transition: all var(--transition-base);
            position: relative;
            overflow: hidden;
        }
        .seance-card:last-child { margin-bottom: 0; }
        .seance-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
            background: var(--primary);
            opacity: 0.6;
        }
        .seance-card:hover {
            transform: translateY(-2px);
            background: var(--primary-light);
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }
        .seance-card:hover::before { opacity: 1; }
        .seance-card strong { display: block; color: var(--text-main); font-size: 0.875rem; margin-bottom: 4px; font-weight: 600; }
        .seance-card p { font-size: 0.75rem; color: var(--text-secondary); margin: 2px 0; display: flex; align-items: center; gap: 6px; }
        .badge-salle {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--primary-light);
            color: var(--primary);
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            font-size: 0.65rem;
            font-weight: 700;
            margin-top: 4px;
        }
        .badge-type {
            display: inline-block;
            background: var(--info-light);
            color: var(--info);
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        #adminFilters {
            background: var(--bg-card) !important;
            border: 1px solid var(--border) !important;
            border-radius: var(--radius-lg) !important;
            padding: var(--space-lg) !important;
            margin-bottom: var(--space-xl) !important;
        }
        @media (max-width: 900px) {
            #emploiTable th:first-child, #emploiTable td:first-child { width: 80px; min-width: 70px; }
            #emploiTable th:not(:first-child), #emploiTable td:not(:first-child) { min-width: 100px; max-width: 120px; }
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../../assets/images/logo.jpeg" alt="supnum" class="sidebar-logo">
                <span class="sidebar-title">supnum</span>
            </div>
            <nav class="sidebar-nav" id="sidebarNav">
                <!-- Rempli dynamiquement selon le rôle -->
            </nav>
            <div style="margin-top: auto; padding-top: var(--space-xl); border-top: 1px solid var(--border-light);">
                <a href="#" id="dynamicBackBtn" class="btn btn-outline" style="width: 100%; text-decoration: none; justify-content: center;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink: 0;"><path d="M19 12H5M12 19l-7-7 7-7" /></svg>
                    Retour
                </a>
                <button onclick="logout()" class="btn btn-danger" style="width: 100%; margin-top: var(--space-sm);">Déconnexion</button>
            </div>
        </aside>

        <main class="main-content">
    <div class="schedule-container">
        <h1 id="scheduleTitle">Emploi du Temps</h1>

        <div id="adminFilters" class="filter-bar" style="display: none; gap: 20px; margin-bottom: 30px; padding: 20px;">
            <div id="filterGroupContainer" style="flex: 1;">
                <label style="display: block; margin-bottom: 8px; color: #64748b; font-size: 0.8rem;">Filtrer
                    par Groupe</label>
                <select id="filterGroup" onchange="genererTableau()" style="width: 100%;">
                    <option value="">-- Sélectionner Groupe --</option>
                </select>
            </div>
            <div id="filterProfContainer" style="flex: 1;">
                <label style="display: block; margin-bottom: 8px; color: #64748b; font-size: 0.8rem;">Filtrer
                    par Professeur</label>
                <select id="filterProf" onchange="genererTableau()" style="width: 100%;">
                    <option value="">Tous les professeurs</option>
                </select>
            </div>
        </div>

        <div class="schedule-table-wrapper">
            <table id="emploiTable">
                <thead>
                    <tr id="headerRow">
                        <th class="day-column">Jour / Période</th>
                    </tr>
                </thead>
                <tbody id="emploiBody">
                </tbody>
            </table>
        </div>
    </div>
        </main>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script>
        let allSeances = [];
        let allPeriodes = [];
        let activeWeek = null;
        const currentUser = JSON.parse(localStorage.getItem('user'));

        function renderSidebar() {
            const nav = document.getElementById('sidebarNav');
            if (!nav) return;
            const base = '../admin/';
            const isAdmin = currentUser.role === 'administrateur';
            const isEtudiant = currentUser.role === 'etudiant';
            const isProf = currentUser.role === 'professeur';

            if (isAdmin) {
                nav.innerHTML = `
                    <a href="${base}admin.html" class="nav-item"><span class="icon">🏠</span>Accueil</a>
                    <a href="${base}student.html" class="nav-item"><span class="icon">🎓</span>Étudiants</a>
                    <a href="${base}prof.html" class="nav-item"><span class="icon">👨‍🏫</span>Professeurs</a>
                    <a href="${base}group.html" class="nav-item"><span class="icon">👥</span>Groupes</a>
                    <a href="${base}matiere.html" class="nav-item"><span class="icon">📚</span>Matières</a>
                    <a href="${base}salle.html" class="nav-item"><span class="icon">🏢</span>Salles</a>
                    <a href="${base}periode.html" class="nav-item"><span class="icon">⏱️</span>Périodes</a>
                    <a href="${base}semaine.html" class="nav-item"><span class="icon">📅</span>Semaines</a>
                    <a href="${base}seance.html" class="nav-item"><span class="icon">📑</span>Séances</a>
                    <a href="../evaluation/evaluation.html" class="nav-item"><span class="icon">📊</span>Évaluations</a>
                    <a href="../tableaux/tableaux.html" class="nav-item active"><span class="icon">📋</span>Emploi du temps</a>
                `;
            } else if (isEtudiant) {
                nav.innerHTML = `
                    <a href="../tableaux/tableaux.html" class="nav-item active"><span class="icon">📅</span>Mon Emploi</a>
                    <a href="../students/student_dashboard.html" class="nav-item"><span class="icon">🏠</span>Accueil</a>
                `;
            } else if (isProf) {
                nav.innerHTML = `
                    <a href="../tableaux/tableaux.html" class="nav-item active"><span class="icon">📅</span>Mon Emploi</a>
                    <a href="../profs/progression.html" class="nav-item"><span class="icon">📊</span>Progression</a>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../Login/index.html';
        }

        async function initPage() {
            if (!currentUser) {
                window.location.href = '../Login/index.html';
                return;
            }
            renderSidebar();

            // Fetch active week
            try {
                const weekRes = await API.get("/semaines/active");
                activeWeek = weekRes.data;
            } catch (err) {
                console.warn("Pas de semaine active:", err);
            }

            const backBtn = document.getElementById('dynamicBackBtn');
            if (currentUser.role === 'administrateur') {
                backBtn.href = '../admin/admin.html';
                document.getElementById('adminFilters').style.display = 'flex';
                initFilters();
            } else if (currentUser.role === 'etudiant') {
                backBtn.href = '../students/student_dashboard.html';
                document.getElementById('scheduleTitle').textContent = 'Mon Emploi du Temps';
                document.getElementById('adminFilters').style.display = 'none';
            } else if (currentUser.role === 'professeur') {
                backBtn.href = '../profs/prof_dashboard.html';
                document.getElementById('scheduleTitle').textContent = 'Mon Emploi du Temps';
            }

            if (activeWeek) {
                const subTitle = document.createElement('p');
                subTitle.style.color = 'var(--primary)';
                subTitle.style.fontWeight = '600';
                subTitle.style.marginTop = '-30px';
                subTitle.style.marginBottom = '30px';
                subTitle.textContent = `Période du ${new Date(activeWeek.date_debut).toLocaleDateString()} au ${new Date(activeWeek.date_fin).toLocaleDateString()} (Semaine ${activeWeek.numSemaine})`;
                document.getElementById('scheduleTitle').after(subTitle);
            }

            genererTableau();
        }

        async function initFilters() {
            try {
                const [groups, profs] = await Promise.all([
                    API.get("/groupes/all"),
                    API.get("/profs/all")
                ]);

                const groupSelect = document.getElementById("filterGroup");
                const profSelect = document.getElementById("filterProf");

                groups.data
                    .filter(g => {
                        if (currentUser.role === 'etudiant') {
                            const studentLevel = currentUser.niveau || "";
                            // Allow groups that match student's year/level (e.g., L1, L2, L3)
                            // or if group name starts with level prefix
                            return g.nom.includes(studentLevel) || g.annee === studentLevel;
                        }
                        return true;
                    })
                    .sort((a, b) => a.nom.localeCompare(b.nom))
                    .forEach(g => {
                        const opt = document.createElement("option");
                        opt.value = g.nom;
                        opt.textContent = g.nom;
                        groupSelect.appendChild(opt);
                    });

                profs.data.sort((a, b) => a.nom.localeCompare(b.nom)).forEach(p => {
                    const opt = document.createElement("option");
                    opt.value = p.nom;
                    opt.textContent = p.nom;
                    profSelect.appendChild(opt);
                });
            } catch (err) {
                console.error("Erreur filters:", err);
            }
        }

        async function genererTableau() {
            const jours = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi"];
            try {
                if (allSeances.length === 0 || allPeriodes.length === 0) {
                    const [periodesRes, seancesRes] = await Promise.all([
                        API.get("/periodes/all"),
                        API.get("/tableaux/all")
                    ]);
                    allPeriodes = periodesRes.data;
                    allSeances = seancesRes.data;
                }

                let filterGroup = "";
                let filterProf = "";

                if (currentUser.role === 'administrateur') {
                    filterGroup = document.getElementById("filterGroup").value;
                    filterProf = document.getElementById("filterProf").value;
                } else if (currentUser.role === 'etudiant') {
                    filterGroup = currentUser.groupe || currentUser.nom_groupe || "";
                } else if (currentUser.role === 'professeur') {
                    filterProf = currentUser.nom;
                }

                const headerRow = document.getElementById("headerRow");
                const tbody = document.getElementById("emploiBody");

                headerRow.innerHTML = '<th class="day-column">Jour / Période</th>';
                tbody.innerHTML = '';

                allPeriodes.forEach(p => {
                    const th = document.createElement("th");
                    th.className = "period-header";
                    const startTime = p.heure_debut ? p.heure_debut.substring(0, 5) : "";
                    const endTime = p.heure_fin ? p.heure_fin.substring(0, 5) : "";
                    th.innerHTML = `${p.nom}<br><span style="font-size: 0.75rem; font-weight: 400; opacity: 0.7;">${startTime} - ${endTime}</span>`;
                    headerRow.appendChild(th);
                });

                jours.forEach((j, index) => {
                    const tr = document.createElement("tr");
                    const tdJour = document.createElement("td");
                    tdJour.className = "day-column";

                    if (activeWeek) {
                        const startDate = new Date(activeWeek.date_debut);
                        const currentDate = new Date(startDate);
                        currentDate.setDate(startDate.getDate() + index);
                        const dayDateStr = currentDate.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
                        tdJour.innerHTML = `${j}<br><span style="font-size: 0.75rem; font-weight: 400; opacity: 0.8;">${dayDateStr}</span>`;
                    } else {
                        tdJour.textContent = j;
                    }

                    tr.appendChild(tdJour);

                    allPeriodes.forEach(p => {
                        const td = document.createElement("td");
                        let filtered = allSeances.filter(s => s.jour === j && s.id_periode === p.id_periode);

                        if (filterGroup) {
                            filtered = filtered.filter(s => s.nom_groupe === filterGroup);
                        }
                        if (filterProf) {
                            filtered = filtered.filter(s => s.nom_professeur === filterProf);
                        }

                        filtered.sort((a, b) => a.nom_groupe.localeCompare(b.nom_groupe)).forEach(s => {
                            const div = document.createElement("div");
                            div.className = "seance-card";
                            div.innerHTML = `
                                <div class="badge-type">${s.type_seance || 'CM'}</div>
                                <strong>${s.nom_matiere}</strong>
                                <p><span>👤</span> ${s.nom_professeur}</p>
                                <p><span>👥</span> ${s.nom_groupe}</p>
                                <div class="badge-salle">
                                    <span>📍</span> ${s.nom_salle}
                                </div>
                            `;
                            td.appendChild(div);
                        });
                        tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error("Erreur:", error);
            }
        }

        document.addEventListener("DOMContentLoaded", initPage);
    </script>

</body>

</html>
