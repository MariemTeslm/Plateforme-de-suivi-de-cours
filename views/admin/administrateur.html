<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>supnum - Gestion des Administrateurs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../assets/images/logo.jpeg" alt="supnum" class="sidebar-logo">
                <span class="sidebar-title">SupNum</span>
            </div>
            <nav class="sidebar-nav"></nav>
            <div style="margin-top: auto; padding-top: var(--space-xl); border-top: 1px solid var(--border-light);">
                <button onclick="logout()" class="btn btn-danger" style="width: 100%;">Déconnexion</button>
            </div>
        </aside>

        <main class="main-content">
            <h1 class="page-title">Gestion des Administrateurs</h1>
            <p class="page-subtitle">Créer, modifier et supprimer les comptes administrateurs</p>

            <form id="adminForm" style="margin-bottom: var(--space-2xl);">
                <legend>Ajouter / Modifier un administrateur</legend>
                <div class="form-grid">
                    <div>
                        <label for="nom">Nom complet</label>
                        <input type="text" id="nom" placeholder="Ex: Admin Principal" required>
                    </div>
                    <div>
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="admin@supnum.mr" required>
                    </div>
                    <div class="full">
                        <label for="mot_de_passe">Mot de passe</label>
                        <input type="password" id="mot_de_passe" placeholder="••••••••" required>
                    </div>
                    <div class="full center" style="margin-top: var(--space-lg); gap: var(--space-md);">
                        <button type="submit" id="submitBtn">Enregistrer</button>
                        <button type="button" id="cancelEdit" class="btn btn-outline" style="display: none;" onclick="cancelAdminEdit()">Annuler</button>
                    </div>
                </div>
            </form>

            <div class="card" style="margin-bottom: var(--space-lg);">
                <input type="text" id="adminSearch" placeholder="Rechercher un administrateur (nom, email...)" style="max-width: 350px;">
            </div>

            <div class="table-responsive">
                <table id="adminsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nom</th>
                            <th>Email</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="administrateur.js"></script>
    <script>
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../Login/index.html';
        }
    </script>
    <script src="admin-sidebar.js"></script>
</body>
</html>
