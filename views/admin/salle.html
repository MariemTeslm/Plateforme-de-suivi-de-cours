<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>supnum - Gestion des Salles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../assets/images/logo.jpeg" alt="supnum" class="sidebar-logo">
                <span class="sidebar-title">SupNum</span>
            </div>
            <nav class="sidebar-nav">
                <a href="admin.html" class="nav-item active">
                    <span class="icon">🏠</span>
                    Accueil
                </a>
                <a href="gestionUtilisateur.html" class="nav-item">
                    <span class="icon">👥</span>
                    Utilisateur
                </a>
                
                <a href="gestionsEtablissement.html" class="nav-item">
                    <span class="icon">🏢</span>
                    Etablissement
                </a>
                <a href="gestionEmploi.html" class="nav-item">
                    <span class="icon">📚</span>
                    Emploi du temps
                </a>
                
                <a href="../evaluation/evaluation.html" class="nav-item">
                    <span class="icon">📊</span>
                    Évaluations
                </a>
               
            </nav>
            <div style="margin-top: auto; padding-top: var(--space-xl); border-top: 1px solid var(--border-light);">
                <button onclick="logout()" class="btn btn-danger" style="width: 100%;">Déconnexion</button>
            </div>
        </aside>

        <main class="main-content">
            <h1 class="page-title">Gestion des Salles</h1>
            <p class="page-subtitle">Disponibilité et occupation</p>

            <form id="salleForm" style="margin-bottom: var(--space-2xl);">
                <legend>Ajouter une nouvelle salle</legend>
                <div class="form-grid">
                    <div><label for="nom">Nom ou Numéro</label><input type="text" id="nom" name="nom" placeholder="Ex: Salle 101" required></div>
                    <div><label for="capacite">Capacité d'accueil</label><input type="number" id="capacite" name="capacite" placeholder="Ex: 30" required></div>
                    <div class="full center" style="margin-top: var(--space-lg); gap: var(--space-md);">
                        <button type="submit" id="submitBtn">Enregistrer</button>
                        <button type="button" id="cancelEdit" class="btn btn-outline" style="display: none;" onclick="cancelSalleEdit()">Annuler</button>
                    </div>
                </div>
            </form>

            <h3 style="margin-bottom: var(--space-md);">Liste des Salles</h3>
            <div class="table-responsive">
                <table id="sallesTable">
                    <thead>
                        <tr><th>Nom</th><th>Capacité</th><th>Actions</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="../assets/js/api.js"></script>
    <script src="salle.js"></script>
    <script>function logout(){localStorage.removeItem('token');localStorage.removeItem('user');window.location.href='../Login/index.html';}</script>
<script src="admin-sidebar.js"></script>
</body>
</html>
