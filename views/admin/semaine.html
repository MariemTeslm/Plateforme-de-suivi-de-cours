<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>supnum - Gestion des Semaines</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .active-badge { background: var(--success); color: white; padding: 4px 12px; border-radius: var(--radius-full); font-size: 0.8rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="app-layout">
         <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../assets/images/logo.jpeg" alt="supnum" class="sidebar-logo">
                <span class="sidebar-title">SupNum</span>
            </div>
            <nav class="sidebar-nav">
                <a href="admin.html" class="nav-item active">
                    <span class="icon">🏠</span>
                    Accueil
                </a>
                <a href="gestionUtilisateur.html" class="nav-item">
                    <span class="icon">👥</span>
                    Utilisateur
                </a>
                
                <a href="gestionsEtablissement.html" class="nav-item">
                    <span class="icon">🏢</span>
                    Etablissement
                </a>
                <a href="gestionEmploi.html" class="nav-item">
                    <span class="icon">📚</span>
                    Emploi du temps
                </a>
                
                <a href="../evaluation/evaluation.html" class="nav-item">
                    <span class="icon">📊</span>
                    Évaluations
                </a>
               
            </nav>
            <div style="margin-top: auto; padding-top: var(--space-xl); border-top: 1px solid var(--border-light);">
                <button onclick="logout()" class="btn btn-danger" style="width: 100%;">Déconnexion</button>
            </div>
        </aside>

        <main class="main-content">
            <h1 class="page-title">Gestion des Semaines</h1>
            <p class="page-subtitle">Configuration des semaines d'enseignement</p>

            <form id="weekForm" style="margin-bottom: var(--space-2xl);">
                <legend>Ajouter un nouvel emploi pour une semaine</legend>
                <div class="form-grid">
                    <div><label for="numSemaine">Numéro de la semaine</label><input type="number" id="numSemaine" placeholder="Ex: 5" required></div>
                    <div><label for="date_debut">Date de début (Lundi)</label><input type="date" id="date_debut" required></div>
                    <div><label for="date_fin">Date de fin (Samedi)</label><input type="date" id="date_fin" required></div>
                    <div class="full center" style="margin-top: var(--space-lg);">
                        <button type="submit">Enregistrer</button>
                    </div>
                </div>
            </form>

            <h3 style="margin-bottom: var(--space-md);">Liste des Semaines</h3>
            <div class="table-responsive">
                <table id="weeksTable">
                    <thead>
                        <tr><th>Numéro</th><th>Début</th><th>Fin</th><th>Statut</th><th>Actions</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="../assets/js/api.js"></script>
    <script src="semaine.js"></script>
    <script>function logout(){localStorage.removeItem('token');localStorage.removeItem('user');window.location.href='../Login/index.html';}</script>
<script src="admin-sidebar.js"></script>
</body>
</html>
