<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     
    <title>supnum - Administration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    
         <style>
      .content{
         margin-left: 300px;
         padding: 100px;
      }      
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: var(--space-lg);
            margin-bottom: var(--space-2xl);
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-xl);
            display: flex;
            align-items: center;
            gap: var(--space-lg);
            transition: all var(--transition-base);
            box-shadow: var(--shadow-sm);
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }
        .stat-icon { font-size: 2.5rem; line-height: 1; }
        .stat-content { display: flex; flex-direction: column; gap: 4px; }
        .stat-label { font-size: 0.875rem; color: var(--text-secondary); font-weight: 500; }
        .stat-value { font-size: 1.75rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.02em; }
        .stat-card--students { border-left: 4px solid #0d9488; }
        .stat-card--profs { border-left: 4px solid #0284c7; }
        .stat-card--groups { border-left: 4px solid #7c3aed; }
        .stat-card--salles { border-left: 4px solid #059669; }
        .section-title { font-size: 1.25rem; font-weight: 700; color: var(--text-main); margin-bottom: var(--space-md); }
        .quick-access-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: var(--space-md);
        }
        .quick-access-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            padding: var(--space-lg);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.9375rem;
            transition: all var(--transition-fast);
        }
        .quick-access-card .icon { font-size: 1.75rem; }
        .quick-access-card:hover {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }
        .quick-access-card--warning:hover { border-color: var(--warning); color: var(--warning); }
        .quick-access-card--success:hover { border-color: var(--success); color: var(--success); }
    </style>
    
</head>
<body>

     <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../assets/images/logo.jpeg" alt="supnum" class="sidebar-logo">
                <span class="sidebar-title">SupNum</span>
            </div>
            <nav class="sidebar-nav">
                <a href="admin.html" class="nav-item active">
                    <span class="icon">🏠</span>
                    Accueil
                </a>
                <a href="gestionUtilisateur.html" class="nav-item">

                </a>
                
                <a href="gestionsEtablissement.html" class="nav-item">
                    <span class="icon">🏢</span>
                    Etablissement
                </a>
                <a href="gestionEmploi.html" class="nav-item">
                    <span class="icon">📚</span>
                    Emploi du temps
                </a>
                
                <a href="../evaluation/evaluation.html" class="nav-item">
                    <span class="icon">📊</span>
                    Évaluations
                </a>
               
            </nav>
            <div style="margin-top: auto; padding-top: var(--space-xl); border-top: 1px solid var(--border-light);">
                <button onclick="logout()" class="btn btn-danger" style="width: 100%;">Déconnexion</button>
            </div>
        </aside>


       <div class="content">

                 <!-- Statistiques -->
            <div class="stats-grid">
                 <a href="group.html" class="quick-access-card">
                    <span class="icon">👥</span>
                    <span>Groupes</span>
                </a>
                <a href="matiere.html" class="quick-access-card">
                    <span class="icon">📚</span>
                    <span>Matières</span>
                </a>
                <a href="salle.html" class="quick-access-card">
                    <span class="icon">🏢</span>
                    <span>Salles</span>
                </a>
            </div>


   </div>         
<script src="admin-sidebar.js"></script>
</body>
</html>
