<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>supnum - Mot de passe oublié</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login-compact.css">
</head>
<body>
    <div class="page-container">
        <div class="card">
            <div class="card-header">
                <div class="card-icon">🔐</div>
                <div class="card-title">Mot de passe oublié</div>
                <div class="card-subtitle">Entrez votre email pour recevoir un code de vérification</div>
            </div>

            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="nom@universite.edu" 
                        required
                    >
                </div>
                <button type="submit" class="btn btn-submit" id="submitBtn">
                    Envoyer le code
                </button>
            </form>

            <div class="back-link">
                <a href="index.html">Retour à la connexion</a>
            </div>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.textContent;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span>Envoi en cours...';

            try {
                const result = await API.post('/password/forgot-password', { email });

                if (result.success) {
                    showToast('Code d\'vérification envoyé à votre email', 'success');
                    // Rediriger vers la vérification OTP après 1s
                    setTimeout(() => {
                        window.location.href = `verify-otp.html?email=${encodeURIComponent(email)}`;
                    }, 1000);
                } else {
                    showToast(result.message || 'Erreur lors de l\'envoi', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            } catch (error) {
                showToast(error.message || 'Erreur serveur', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
    </script>
</body>
</html>
