<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<title>supnum - Mon Emploi</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="../assets/css/style.css">
	<style>
		.emploi-table { width: 100%; border-collapse: collapse; margin-top: var(--space-xl); background: var(--bg-card); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-md); }
		.emploi-table th { background: var(--primary); color: white; padding: var(--space-md); text-align: left; }
		.emploi-table td { border: 1px solid var(--border); padding: var(--space-md); vertical-align: top; }
		.jour-cell { background: var(--primary); color: white; font-weight: 600; text-align: center; width: 120px; }
		.cell-seance { font-size: 0.9rem; line-height: 1.6; }
		.cell-seance .ligne { margin-bottom: var(--space-xs); }
		.empty { text-align: center; color: var(--text-secondary); }
		.error { background: #fee2e2; color: #991b1b; border-left: 4px solid #dc2626; border-radius: 8px; padding: 12px; margin-bottom: var(--space-lg); }
	</style>
</head>
<body>
	<div class="app-layout">
		<aside class="sidebar">
			<div class="sidebar-header">
				<img src="../assets/images/logo.jpeg" alt="supnum" class="sidebar-logo">
				<span class="sidebar-title">supnum</span>
			</div>
			<nav class="sidebar-nav">
				<a href="emploi.html" class="nav-item active"><span class="icon">📅</span>Mon Emploi</a>
				<a href="progression.html" class="nav-item"><span class="icon">📊</span>Progression</a>
				<a href="prof_dashboard.html" class="nav-item"><span class="icon">🏠</span>Accueil</a>
			</nav>
			<div style="margin-top: auto; padding-top: var(--space-xl); border-top: 1px solid var(--border-light);">
				<button onclick="logout()" class="btn btn-danger" style="width: 100%;">Déconnexion</button>
			</div>
		</aside>

		<main class="main-content">
			<h1 class="page-title">Mon Emploi du temps</h1>
			<p class="page-subtitle">Séances de la semaine active pour <span id="prof-name">...</span>.</p>
			<div id="error-container"></div>
			<div id="emploi-container"></div>
		</main>
	</div>

	<script src="../assets/js/api.js"></script>
	<script>
		const jours = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
		const user = JSON.parse(localStorage.getItem('user') || '{}');

		function logout() {
			localStorage.clear();
			window.location.href = '../Login/index.html';
		}

		function showError(message) {
			document.getElementById('error-container').innerHTML = `<div class="error">${message}</div>`;
		}

		function escapeHtml(text) {
			return String(text).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
		}

		function renderEmploi(data) {
			const periodes = data.periodes || [];
			const emploi = data.emploi || [];

			if (emploi.length === 0) {
				document.getElementById('emploi-container').innerHTML = '<p class="empty">Aucune séance planifiée cette semaine.</p>';
				return;
			}

			let html = '<table class="emploi-table"><thead><tr><th>Jour</th>';
			periodes.forEach(p => {
				html += `<th>${p.heure_debut.substring(0,5)} - ${p.heure_fin.substring(0,5)}</th>`;
			});
			html += '</tr></thead><tbody>';

			jours.forEach(jour => {
				html += `<tr><td class="jour-cell">${jour}</td>`;
				periodes.forEach(periode => {
					const s = emploi.find(x => x.jour === jour && Number(x.id_periode) === Number(periode.id_periode));
					if (!s) {
						html += '<td class="empty">-</td>';
					} else {
						html += `<td class="cell-seance">
							<div class="ligne"><strong>Matière:</strong> ${escapeHtml(s.matiere)}</div>
							<div class="ligne"><strong>Groupe:</strong> ${escapeHtml(s.groupe || '-')}</div>
							<div class="ligne"><strong>Salle:</strong> ${escapeHtml(s.salle || '-')}</div>
						</td>`;
					}
				});
				html += '</tr>';
			});

			html += '</tbody></table>';
			document.getElementById('emploi-container').innerHTML = html;
		}

		async function init() {
			if (!user.nom || user.role !== 'professeur') {
				window.location.href = '../Login/index.html';
				return;
			}
			document.getElementById('prof-name').textContent = user.nom;

			try {
				const result = await API.get(`/api/emploi/data?id_professeur=${user.id}`);
				if (!result.success) {
					showError(result.message || 'Impossible de charger l\'emploi');
					return;
				}
				renderEmploi(result.data || {});
			} catch (e) {
				showError(e.message || 'Erreur réseau');
			}
		}

		init();
	</script>
<script src="prof-sidebar.js"></script>
</body>
</html>
