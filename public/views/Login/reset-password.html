<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>supnum - Nouveau mot de passe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login-compact.css">
</head>
<body>
    <div class="page-container">
        <div class="card">
            <div class="card-header">
                <div class="card-icon">🔑</div>
                <div class="card-title">Nouveau mot de passe</div>
                <div class="card-subtitle">Créez un nouveau mot de passe sécurisé</div>
            </div>

            <div class="success-message" id="successMessage">
                <div class="icon">✓</div>
                <strong>Mot de passe réinitialisé !</strong>
                <p style="font-size: 0.875rem; margin-top: 4px;">Redirection vers la connexion...</p>
            </div>

            <form id="resetForm">
                <div class="form-group">
                    <label for="password">Nouveau mot de passe</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="••••••••" 
                            minlength="4"
                            required
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            👁️
                        </button>
                    </div>
                    <div class="password-strength" id="strengthIndicator"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmer le mot de passe</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            placeholder="••••••••" 
                            minlength="4"
                            required
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                            👁️
                        </button>
                    </div>
                </div>

                <div style="font-size: 0.8rem; color: #64748b; margin-bottom: 16px;">
                    ✓ Minimum 6 caractères<br>
                    <span id="matchInd" style="color: #ef4444;">⚠ Les mots de passe ne correspondent pas</span>
                </div>

                <button type="submit" class="btn btn-submit" id="submitBtn" disabled>
                    Réinitialiser le mot de passe
                </button>
            </form>

            <div class="back-link">
                <a href="index.html">Retour à la connexion</a>
            </div>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email');
        const otp = params.get('otp');

        if (!email || !otp) {
            window.location.href = 'forgot-password.html';
        }

        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');
        const strengthIndicator = document.getElementById('strengthIndicator');
        const matchInd = document.getElementById('matchInd');

        passwordInput.addEventListener('input', () => {
            updatePasswordStrength();
            checkPasswordMatch();
        });

        confirmInput.addEventListener('input', checkPasswordMatch);

        function updatePasswordStrength() {
            const password = passwordInput.value;
            let strength = 'weak';
            let message = 'Faible';

            if (password.length >= 8) {
                strength = 'medium';
                message = 'Moyen';
            }
            if (/[0-9]/.test(password) && /[A-Z]/.test(password)) {
                strength = 'strong';
                message = 'Fort';
            }

            strengthIndicator.className = `password-strength show ${strength}`;
            strengthIndicator.textContent = `Force : ${message}`;
        }

        function checkPasswordMatch() {
            if (confirmInput.value && passwordInput.value !== confirmInput.value) {
                matchInd.style.color = '#ef4444';
                matchInd.textContent = '⚠ Les mots de passe ne correspondent pas';
            } else if (confirmInput.value) {
                matchInd.style.color = '#16a34a';
                matchInd.textContent = '✓ Les mots de passe correspondent';
            } else {
                matchInd.style.color = '#ef4444';
                matchInd.textContent = '⚠ Les mots de passe ne correspondent pas';
            }

            updateSubmitButton();
        }

        function updateSubmitButton() {
            const isValid = passwordInput.value.length >= 6 && 
                          passwordInput.value === confirmInput.value;
            submitBtn.disabled = !isValid;
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = passwordInput.value;
            const confirmPassword = confirmInput.value;

            if (newPassword !== confirmPassword) {
                showToast('Les mots de passe ne correspondent pas', 'error');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span>Réinitialisation...';

            try {
                const result = await API.post('/password/reset-password', {
                    email,
                    otp,
                    newPassword,
                    confirmPassword
                });

                if (result.success) {
                    document.getElementById('resetForm').style.display = 'none';
                    document.querySelector('.card-header').style.display = 'none';
                    document.querySelector('.back-link').style.display = 'none';
                    document.getElementById('successMessage').classList.add('show');

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                } else {
                    showToast(result.message || 'Erreur lors de la réinitialisation', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            } catch (error) {
                showToast(error.message || 'Erreur serveur', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
    </script>
</body>
</html>
